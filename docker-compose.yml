version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: streamforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d streamforge"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3,sqs
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"

  schema-seeder:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    command: >
      sh -c "psql -h postgres -U postgres -d streamforge -c \"INSERT INTO tenants(id,name) VALUES ('tenant-a','Tenant A') ON CONFLICT DO NOTHING;\""

  ingest:
    image: golang:1.22
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "go run ./cmd/ingest"
    depends_on:
      - postgres
      - redis
      - kafka
      - localstack
    ports:
      - "8080:8080"

  worker:
    image: golang:1.22
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "go run ./cmd/worker"
    depends_on:
      - postgres
      - redis
      - kafka
      - localstack

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9091:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deploy/k8s/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
