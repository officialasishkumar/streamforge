x-streamforge-env: &streamforge-env
  STREAMFORGE_POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/streamforge?sslmode=disable
  STREAMFORGE_REDIS_ADDR: redis:6379
  STREAMFORGE_KAFKA_BROKERS: kafka:9092
  STREAMFORGE_S3_ENDPOINT: http://localstack:4566
  STREAMFORGE_SQS_ENDPOINT: http://localstack:4566
  STREAMFORGE_SQS_QUEUE_URL: http://localstack:4566/000000000000/streamforge-outbox

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: streamforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d streamforge"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3,sqs
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"

  schema-seeder:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    command: >
      sh -c "psql -h postgres -U postgres -d streamforge -c \"INSERT INTO tenants(id,name) VALUES ('tenant-a','Tenant A') ON CONFLICT DO NOTHING;\""

  ingest:
    build: .
    image: streamforge:local
    environment:
      <<: *streamforge-env
      STREAMFORGE_SERVICE: ingest
    depends_on:
      - postgres
      - redis
      - kafka
      - localstack
    ports:
      - "8080:8080"

  worker:
    image: streamforge:local
    environment:
      <<: *streamforge-env
      STREAMFORGE_SERVICE: worker
    depends_on:
      - ingest
      - postgres
      - redis
      - kafka
      - localstack

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9091:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deploy/k8s/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
