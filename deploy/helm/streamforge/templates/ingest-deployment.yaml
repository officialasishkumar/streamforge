apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamforge-ingest
spec:
  replicas: {{ .Values.ingest.replicas }}
  selector:
    matchLabels:
      app: streamforge-ingest
  template:
    metadata:
      labels:
        app: streamforge-ingest
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: ingest
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["./cmd/ingest"]
          ports:
            - containerPort: 8080
          env:
            - name: STREAMFORGE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: streamforge-secrets
                  key: POSTGRES_DSN
          volumeMounts:
            - name: config
              mountPath: /etc/streamforge
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
      volumes:
        - name: config
          configMap:
            name: streamforge-config
