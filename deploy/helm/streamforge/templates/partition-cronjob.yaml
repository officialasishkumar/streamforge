apiVersion: batch/v1
kind: CronJob
metadata:
  name: streamforge-partition-creator
spec:
  schedule: "0 0 25 * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: partition-creator
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command: ["/bin/sh", "-c", "/app/scripts/create_partition.sh"]
              env:
                - name: STREAMFORGE_POSTGRES_DSN
                  valueFrom:
                    secretKeyRef:
                      name: streamforge-secrets
                      key: POSTGRES_DSN
