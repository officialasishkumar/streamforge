apiVersion: v1
kind: ConfigMap
metadata:
  name: streamforge-config
  namespace: streamforge
data:
  streamforge.yaml: |
    ingest:
      port: 8080
      max_batch_size: 1000
      request_timeout: 5s
---
apiVersion: v1
kind: Secret
metadata:
  name: streamforge-secrets
  namespace: streamforge
type: Opaque
stringData:
  POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/streamforge?sslmode=disable
