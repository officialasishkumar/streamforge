name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker buildx build --platform linux/amd64,linux/arm64 -t ghcr.io/officialasishkumar/streamforge:${{ github.ref_name }} --push .
      - uses: azure/setup-helm@v4
      - run: helm package deploy/helm/streamforge --destination dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz
          generate_release_notes: true
